<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <script>
        async function get() {
            const response = await fetch("https://api.chucknorris.io/jokes/random");
            const data = await response.json();
            document.getElementById('joke').innerHTML = data.value;
        }
    </script>
    <div class="container" style="margin-top: 10%;height: fit-content;border: 2px solid black; padding: 2%; width: 80%;">
        <h1 style="color: rgb(80, 80, 255);font-weight: bolder;">Random Jokes generator : </h1>
        <p id="joke" style="font-size: larger;"></p>
        <button onclick="get()" class="btn btn-primary">Generate</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
