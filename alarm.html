<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alarm Clock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
        }
        .clock {
            font-size: 3rem;
            margin: 20px 0;
            font-weight: bold;
        }
        .alarm-form {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Alarm Clock</h1>
    <div class="clock" id="current-time">00:00:00</div>
    
    <div class="alarm-form">
        <h2>Set Alarm</h2>
        <input type="time" id="alarm-time" placeholder="Select alarm time">
        <button onclick="setAlarm()">Set Alarm</button>
        <div id="alarm-status" style="margin-top: 10px;"></div>
    </div>

    <audio id="alarm-sound" src="./sound.wav" preload="auto"></audio>

    <script>
        // Display current time
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Update time every second
        setInterval(updateTime, 1000);
        updateTime(); // Initial call

        let alarmTimeout = null;
        let alarmSet = false;

        function setAlarm() {
            const alarmTimeInput = document.getElementById('alarm-time').value;
            if (!alarmTimeInput) {
                document.getElementById('alarm-status').textContent = 'Please select a time for the alarm.';
                return;
            }

            // Clear any existing alarm
            if (alarmTimeout) {
                clearTimeout(alarmTimeout);
                alarmTimeout = null;
            }

            const [alarmHours, alarmMinutes] = alarmTimeInput.split(':').map(Number);
            const now = new Date();
            const alarmTime = new Date(now);
            alarmTime.setHours(alarmHours, alarmMinutes, 0, 0);

            // If alarm time is in the past, set for tomorrow
            if (alarmTime <= now) {
                alarmTime.setDate(alarmTime.getDate() + 1);
            }

            const timeUntilAlarm = alarmTime - now;
            alarmTimeout = setTimeout(playAlarm, timeUntilAlarm);

            const alarmTimeString = `${alarmHours.toString().padStart(2, '0')}:${alarmMinutes.toString().padStart(2, '0')}`;
            document.getElementById('alarm-status').textContent = `Alarm set for ${alarmTimeString}`;
            alarmSet = true;
        }

        function playAlarm() {
            const audio = document.getElementById('alarm-sound');
            audio.play().catch(e => {
                console.log('Audio playback failed:', e);
                // Fallback: try to play again with user interaction
                document.body.addEventListener('click', function playOnInteraction() {
                    audio.play();
                    document.body.removeEventListener('click', playOnInteraction);
                }, { once: true });
            });
            
            // Show alert
            alert('Alarm! Time to wake up!');
            
            // Reset alarm
            alarmSet = false;
            document.getElementById('alarm-status').textContent = 'Alarm triggered!';
            document.getElementById('alarm-time').value = '';
        }
    </script>
</body>
</html>
