<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #password {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 16px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Generator</h2>
        <p>Generates a password with at least one lowercase, one uppercase, and one special character.</p>
        <input type="text" id="password" readonly placeholder="Generated password will appear here">
        <br>
        <button onclick="generatePassword()">Generate Password</button>
    </div>

    <script>
        class Password {
            constructor() {
                this.lowercase = 'abcdefghijklmnopqrstuvwxyz';
                this.uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                this.special = '!@#$%^&*()_+-=[]{}|;:,.<>?';
                this.allChars = this.lowercase + this.uppercase + this.special;
            }

            generate(length = 12) {
                // Ensure at least one of each required character type
                let password = [
                    this.lowercase.charAt(Math.floor(Math.random() * this.lowercase.length)),
                    this.uppercase.charAt(Math.floor(Math.random() * this.uppercase.length)),
                    this.special.charAt(Math.floor(Math.random() * this.special.length))
                ];

                // Fill the rest with random characters
                for (let i = 3; i < length; i++) {
                    password.push(this.allChars.charAt(Math.floor(Math.random() * this.allChars.length)));
                }

                // Shuffle the password array
                for (let i = password.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [password[i], password[j]] = [password[j], password[i]];
                }

                return password.join('');
            }
        }

        function generatePassword() {
            const passwordGenerator = new Password();
            const generatedPassword = passwordGenerator.generate();
            document.getElementById('password').value = generatedPassword;
        }
    </script>
</body>
</html>
